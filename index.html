<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Password Strength Checker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🔐 Password Strength Checker</h1>

    <div class="input-box">
        <input type="password" id="password" placeholder="Enter Password">
        <button id="toggleBtn">👁</button>
    </div>

    <div class="strength-container">
        <div id="strength-fill"></div>
    </div>

    <div id="strength-text">Strength: None</div>

    <div id="score">Score: 0%</div>

    <ul class="requirements">
        <li id="length">❌ Minimum 8 Characters</li>
        <li id="upper">❌ Uppercase Letter</li>
        <li id="lower">❌ Lowercase Letter</li>
        <li id="number">❌ Number</li>
        <li id="special">❌ Special Character</li>
    </ul>

    <div id="tips"></div>

</div>

<script src="script.js"></script>
</body>
</html>
