<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Strength Checker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body background-color:Pink>
  <!-- Realistic floating background images -->
  <img src="https://cdn-icons-png.flaticon.com/512/1532/1532783.png" class="bg-icon icon-terminal" alt="Terminal Code Icon" />
  <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" class="bg-icon icon-password" alt="Password Dots Icon" />
  <img src="https://cdn-icons-png.flaticon.com/512/2933/2933245.png" class="bg-icon icon-padlock" alt="Padlock Icon" />
  <img src="https://cdn-icons-png.flaticon.com/512/483/483345.png" class="bg-icon icon-key" alt="Key Icon" />

  <div class="container">
    <h2>Password Strength Checker</h2>
    <input type="password" id="password" placeholder="Enter password" />
    <div id="strength-bar">
      <div id="strength-fill"></div>
    </div>
    <p id="strength-text">Strength: </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
